# K=2 mixtures + same curriculum as group_mixture_linear.yaml, but train with x_0 >= 0 (truncated Gaussian on dim 0).
# Does NOT inherit test_two_components — uses the main group_mixture_linear recipe.
#
# Eval (full-Gaussian / OOD x): call sample_xs(..., x_distribution_override="standard").
inherit:
  - models/standard.yaml
  - wandb.yaml
  - group_mixture_linear.yaml

training:
  # Must live here — NOT under task_kwargs. train.py loads state from
  #   {out_dir}/{resume_id}/state.pt  when resume is true.
  resume: true
  resume_id: b07e8f75-2ae3-4056-b0d1-d4ebd8461d21
  # Optional: continue same Weights & Biases run (paste id from URL .../runs/<id>)
  wandb_resume_id: dmkvk8ct

  task_kwargs:
    n_components: 2
    ood_training: true
    # x_distribution_train: truncated_half_space_dim0   # explicit alternative to ood_training: true
    # target_cluster_context_points: 6   # override if you want a different T than group_mixture_linear.yaml

out_dir: ../models/group_mixture_linear


wandb:
  name: "group_mixture_linear_ood_halfspace"
